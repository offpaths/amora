name = "amora-api"
main = "src/index.ts"
compatibility_date = "2026-06-22"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_STORE_BUNDLE_ID = "com.planwithamora.Amora"
# Public deployments should use App Store environments only.
# Add Production here and set APP_STORE_APP_APPLE_ID when validating live App Store proofs.
APP_STORE_ALLOWED_ENVIRONMENTS = "Sandbox"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[[kv_namespaces]]
binding = "PLANS"
id = "010e036915b54d59bcec89d224b5eab4"
preview_id = "03bba01fb84c487395fb91c69b60ccee"

[[routes]]
pattern = "api.planwithamora.com"
custom_domain = true
